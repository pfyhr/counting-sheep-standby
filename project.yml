name: CountingSheep
options:
  bundleIdPrefix: com.pontus
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  CountingSheep:
    type: application
    platform: iOS
    sources:
      - path: CountingSheep
    info:
      path: CountingSheep/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.pontus.CountingSheep
      SWIFT_VERSION: "6.0"
      DEVELOPMENT_TEAM: ""
    dependencies:
      - target: SheepWidget

  SheepWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: SheepWidget
    info:
      path: SheepWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.pontus.CountingSheep.SheepWidget
      SWIFT_VERSION: "6.0"
      DEVELOPMENT_TEAM: ""
