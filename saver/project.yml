name: CountingSheep
options:
  bundleIdPrefix: com.pfyhr
  deploymentTarget:
    macOS: "12.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "12.0"

targets:
  CountingSheepSaver:
    type: bundle
    platform: macOS
    sources:
      - path: Sources
    info:
      path: Info.plist
      properties:
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: BNDL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSPrincipalClass: CountingSheepSaver
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pfyhr.counting-sheep-saver
        WRAPPER_EXTENSION: saver
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
    dependencies:
      - sdk: ScreenSaver.framework
      - sdk: WebKit.framework
    postBuildScripts:
      - name: Copy Web App HTML
        script: |
          HTML="${SRCROOT}/../docs/index.html"
          DEST="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/index.html"
          mkdir -p "$(dirname "$DEST")"
          cp "$HTML" "$DEST"
        inputFiles:
          - "${SRCROOT}/../docs/index.html"
        outputFiles:
          - "${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/index.html"
