  <circle cx="15" cy="18" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="28" cy="10" r="1" fill="white" opacity="0.7"/>
  <circle cx="75" cy="14" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="88" cy="22" r="1" fill="white" opacity="0.7"/>
